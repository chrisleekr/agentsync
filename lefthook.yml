pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,js,json}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      run: bunx tsc --noEmit

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(cat {1})
        pattern="^(feat|fix|chore|docs|test|refactor|perf|ci|build|revert)(\(.+\))?(!)?: .{1,}"
        if ! echo "$msg" | grep -qE "$pattern"; then
          echo "ERROR: Commit message does not follow Conventional Commits."
          echo "Expected format: type(scope)?: description"
          echo "Valid types: feat, fix, chore, docs, test, refactor, perf, ci, build, revert"
          echo "Got: $msg"
          exit 1
        fi
